backend:
  - 'portfolio-project/backend/**'

frontend:
  - 'portfolio-project/frontend/**'

ci:
  - '.github/workflows/**'
  - '.github/dependabot.yml'
  - '.github/labeler.yml'
  - '.github/pull_request_template.md'
  - '.github/CODEOWNERS'

infra:
  - 'portfolio-project/docker-data/**'
  - 'portfolio-project/database/**'
  - 'portfolio-project/backend/Dockerfile'
  - 'portfolio-project/backend/docker-compose.yml'
  - 'start.ps1'
  - 'portfolio-project/start.ps1'
  - 'portfolio-project/status.ps1'
  - 'portfolio-project/stop.ps1'

security:
