name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-quality:
    name: Backend Quality (Prod Gate)
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:///./ci.db
      SECRET_KEY: ci-secret-key-123456789012345678901234
      SMTP_USERNAME: ci@example.com
      SMTP_PASSWORD: ci-password
      REDIS_URL: redis://localhost:6379/0
      FRONTEND_URL: http://localhost:3000
      ADMIN_EMAILS: admin@test.com

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: portfolio-project/backend/requirements.txt

      - name: Install backend dependencies
        working-directory: portfolio-project
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run backend tests
        working-directory: portfolio-project
        run: python -m pytest -q

  frontend-quality:
    name: Frontend Quality (Prod Gate)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: portfolio-project/frontend/package-lock.json

      - name: Install dependencies
        working-directory: portfolio-project/frontend
        run: npm ci

      - name: Lint
        working-directory: portfolio-project/frontend
        run: npm run lint

      - name: Test
        working-directory: portfolio-project/frontend
        run: npm run test

      - name: Build
        working-directory: portfolio-project/frontend
        run: npm run build

  deploy-backend:
    name: Deploy Backend Production (Railway)
    runs-on: ubuntu-latest
    needs:
      - backend-quality
      - frontend-quality
    environment:
      name: production
    steps:
      - name: Validate required secrets
        env:
          RAILWAY_PRODUCTION_MIGRATION_HOOK_URL: ${{ secrets.RAILWAY_PRODUCTION_MIGRATION_HOOK_URL }}
          RAILWAY_PRODUCTION_DEPLOY_HOOK_URL: ${{ secrets.RAILWAY_PRODUCTION_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RAILWAY_PRODUCTION_MIGRATION_HOOK_URL" ]; then
            echo "Missing secret: RAILWAY_PRODUCTION_MIGRATION_HOOK_URL"
            exit 1
          fi
          if [ -z "$RAILWAY_PRODUCTION_DEPLOY_HOOK_URL" ]; then
            echo "Missing secret: RAILWAY_PRODUCTION_DEPLOY_HOOK_URL"
            exit 1
          fi

      - name: Run pre-deploy migrations
        env:
          RAILWAY_PRODUCTION_MIGRATION_HOOK_URL: ${{ secrets.RAILWAY_PRODUCTION_MIGRATION_HOOK_URL }}
        run: curl -fsSL -X POST "$RAILWAY_PRODUCTION_MIGRATION_HOOK_URL"

      - name: Trigger Railway production deployment
        env:
          RAILWAY_PRODUCTION_DEPLOY_HOOK_URL: ${{ secrets.RAILWAY_PRODUCTION_DEPLOY_HOOK_URL }}
        run: curl -fsSL -X POST "$RAILWAY_PRODUCTION_DEPLOY_HOOK_URL"

  deploy-frontend:
    name: Deploy Frontend Production (Vercel)
    runs-on: ubuntu-latest
    needs:
      - backend-quality
      - frontend-quality
    environment:
      name: production
    defaults:
      run:
        working-directory: portfolio-project/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: portfolio-project/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Validate Vercel secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Missing Vercel production secrets."
            exit 1
          fi

      - name: Deploy production to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm i -g vercel@latest
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

  post-deploy-smoke:
    name: Production Smoke Checks
    runs-on: ubuntu-latest
    needs:
      - deploy-backend
      - deploy-frontend
    environment:
      name: production
    steps:
      - name: Validate smoke configuration
        env:
          PRODUCTION_API_ROOT_URL: ${{ vars.PRODUCTION_API_ROOT_URL }}
          PRODUCTION_FRONTEND_URL: ${{ vars.PRODUCTION_FRONTEND_URL }}
          PRODUCTION_SMOKE_ADMIN_EMAIL: ${{ secrets.PRODUCTION_SMOKE_ADMIN_EMAIL }}
          PRODUCTION_SMOKE_ADMIN_PASSWORD: ${{ secrets.PRODUCTION_SMOKE_ADMIN_PASSWORD }}
        run: |
          if [ -z "$PRODUCTION_API_ROOT_URL" ]; then
            echo "Missing variable: PRODUCTION_API_ROOT_URL"
            exit 1
          fi
          if [ -z "$PRODUCTION_FRONTEND_URL" ]; then
            echo "Missing variable: PRODUCTION_FRONTEND_URL"
            exit 1
          fi
          if [[ ! "$PRODUCTION_API_ROOT_URL" =~ ^https:// ]]; then
            echo "PRODUCTION_API_ROOT_URL must start with https://"
            exit 1
          fi
          if [[ ! "$PRODUCTION_FRONTEND_URL" =~ ^https:// ]]; then
            echo "PRODUCTION_FRONTEND_URL must start with https://"
            exit 1
          fi
          if [[ "$PRODUCTION_API_ROOT_URL" == */ ]]; then
            echo "PRODUCTION_API_ROOT_URL must not have a trailing slash"
            exit 1
          fi
          if [[ "$PRODUCTION_FRONTEND_URL" == */ ]]; then
            echo "PRODUCTION_FRONTEND_URL must not have a trailing slash"
            exit 1
          fi
          if [ -z "$PRODUCTION_SMOKE_ADMIN_EMAIL" ] || [ -z "$PRODUCTION_SMOKE_ADMIN_PASSWORD" ]; then
            echo "Missing smoke admin credentials."
            exit 1
          fi

      - name: Wait for readiness
        env:
          PRODUCTION_API_ROOT_URL: ${{ vars.PRODUCTION_API_ROOT_URL }}
        run: |
          for attempt in {1..30}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$PRODUCTION_API_ROOT_URL/ready")
            if [ "$code" = "200" ]; then
              echo "API is ready"
              exit 0
            fi
            echo "Attempt $attempt/30 ready=$code"
            sleep 10
          done
          echo "API readiness check failed"
          exit 1

      - name: Run smoke checks
        env:
          PRODUCTION_API_ROOT_URL: ${{ vars.PRODUCTION_API_ROOT_URL }}
          PRODUCTION_FRONTEND_URL: ${{ vars.PRODUCTION_FRONTEND_URL }}
          PRODUCTION_SMOKE_ADMIN_EMAIL: ${{ secrets.PRODUCTION_SMOKE_ADMIN_EMAIL }}
          PRODUCTION_SMOKE_ADMIN_PASSWORD: ${{ secrets.PRODUCTION_SMOKE_ADMIN_PASSWORD }}
        run: |
          curl -fsSL "$PRODUCTION_API_ROOT_URL/live" >/dev/null
          curl -fsSL "$PRODUCTION_API_ROOT_URL/health" >/dev/null
          curl -fsSL "$PRODUCTION_FRONTEND_URL" >/dev/null

          LOGIN_RESPONSE=$(curl -fsSL -X POST "$PRODUCTION_API_ROOT_URL/api/v1/auth/login/json" \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"$PRODUCTION_SMOKE_ADMIN_EMAIL\",\"password\":\"$PRODUCTION_SMOKE_ADMIN_PASSWORD\"}")
          export LOGIN_RESPONSE

          ACCESS_TOKEN=$(python - <<'PY'
import json, os
body = json.loads(os.environ["LOGIN_RESPONSE"])
print(body["access_token"])
PY
          )

          curl -fsSL "$PRODUCTION_API_ROOT_URL/api/v1/admin/stats" \
            -H "Authorization: Bearer $ACCESS_TOKEN" >/dev/null

          echo "Production smoke checks passed"
