name: CI

on:
  push:
    branches:
      - main
      - Codex_Implementation
      - develop
  pull_request:
    branches:
      - main
      - Codex_Implementation
      - develop

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-quality:
    name: Backend Quality
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:///./ci.db
      SECRET_KEY: ci-secret-key
      SMTP_USERNAME: ci@example.com
      SMTP_PASSWORD: ci-password
      REDIS_URL: redis://localhost:6379/0
      FRONTEND_URL: http://localhost:3000
      ADMIN_EMAILS: admin@test.com

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: portfolio-project/backend/requirements-dev.txt

      - name: Install backend dependencies
        working-directory: portfolio-project
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt

      - name: Run backend tests with coverage
        working-directory: portfolio-project
        run: python -m pytest -q

      - name: Upload backend coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: backend-coverage
          path: portfolio-project/backend/coverage.xml
          if-no-files-found: error

  frontend-quality:
    name: Frontend Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: portfolio-project/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: portfolio-project/frontend
        run: npm ci

      - name: Lint frontend
        working-directory: portfolio-project/frontend
        run: npm run lint

      - name: Run frontend tests
        working-directory: portfolio-project/frontend
        run: npm run test

      - name: Generate frontend coverage report
        working-directory: portfolio-project/frontend
        run: npm run test:coverage

      - name: Build frontend
        working-directory: portfolio-project/frontend
        run: npm run build

      - name: Upload frontend coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: frontend-coverage
          path: portfolio-project/frontend/coverage/lcov.info
          if-no-files-found: error

  sonarcloud:
    name: SonarCloud Scan (Push)
    runs-on: ubuntu-latest
    needs:
      - backend-quality
      - frontend-quality
    if: ${{ github.event_name == 'push' }}

    steps:
      - name: Detect SonarCloud configuration
        id: sonar_config
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
        run: |
          if [ -z "$SONAR_TOKEN" ] || [ -z "$SONAR_ORGANIZATION" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Skipping SonarCloud scan: SONAR_TOKEN or SONAR_ORGANIZATION is missing."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: ${{ steps.sonar_config.outputs.enabled == 'true' }}
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Download backend coverage artifact
        if: ${{ steps.sonar_config.outputs.enabled == 'true' }}
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: backend-coverage
          path: portfolio-project/backend

      - name: Download frontend coverage artifact
        if: ${{ steps.sonar_config.outputs.enabled == 'true' }}
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: frontend-coverage
          path: portfolio-project/frontend/coverage

      - name: SonarCloud scan
        if: ${{ steps.sonar_config.outputs.enabled == 'true' }}
        uses: SonarSource/sonarqube-scan-action@2f77a1ec69fb1d595b06f35ab27e97605bdef703 # v5
        with:
          projectBaseDir: portfolio-project
          args: >
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
