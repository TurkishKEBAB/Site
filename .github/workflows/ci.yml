name: CI

on:
  push:
    branches:
      - main
      - Codex_Implementation
      - develop
  pull_request:
    branches:
      - main
      - Codex_Implementation
      - develop

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-quality:
    name: Backend Quality
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:///./ci.db
      SECRET_KEY: ci-secret-key
      SMTP_USERNAME: ci@example.com
      SMTP_PASSWORD: ci-password
      REDIS_URL: redis://localhost:6379/0
      FRONTEND_URL: http://localhost:3000
      ADMIN_EMAILS: admin@test.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: portfolio-project/backend/requirements.txt

      - name: Install backend dependencies
        working-directory: portfolio-project
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run backend tests with coverage
        working-directory: portfolio-project
        run: python -m pytest -q

      - name: Upload backend coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: portfolio-project/backend/coverage.xml
          if-no-files-found: error

  frontend-quality:
    name: Frontend Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: portfolio-project/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: portfolio-project/frontend
        run: npm ci

      - name: Lint frontend
        working-directory: portfolio-project/frontend
        run: npm run lint

      - name: Run frontend tests
        working-directory: portfolio-project/frontend
        run: npm run test

      - name: Generate frontend coverage report
        working-directory: portfolio-project/frontend
        run: npm run test:coverage

      - name: Build frontend
        working-directory: portfolio-project/frontend
        run: npm run build

      - name: Upload frontend coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: portfolio-project/frontend/coverage/lcov.info
          if-no-files-found: error

  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    needs:
      - backend-quality
      - frontend-quality
    if: ${{ secrets.SONAR_TOKEN != '' && vars.SONAR_ORGANIZATION != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download backend coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: portfolio-project/backend

      - name: Download frontend coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: portfolio-project/frontend/coverage

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v5
        with:
          projectBaseDir: portfolio-project
          args: >
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
