name: Stale Issues and PRs

on:
  schedule:
    - cron: '30 6 * * 1'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - name: Mark stale issues and pull requests
        uses: actions/stale@5bef64f19d7facfb25b37b414482c7164d639639 # v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: >-
            This issue has been automatically marked as stale due to inactivity.
            If it is still relevant, add a comment or update it.
          stale-pr-message: >-
            This pull request has been automatically marked as stale due to inactivity.
            Rebase, push changes, or comment to keep it active.
          close-issue-message: >-
            Closing this issue due to prolonged inactivity.
          close-pr-message: >-
            Closing this pull request due to prolonged inactivity.
          days-before-stale: 30
          days-before-close: 14
          exempt-issue-labels: security,pinned,planned
          exempt-pr-labels: security,pinned,work-in-progress
          stale-issue-label: stale
          stale-pr-label: stale
          remove-stale-when-updated: true
